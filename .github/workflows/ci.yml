# Build, test, and format zig-libsql (Linux primary).
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

env:
  ZIG_VERSION: "0.16.0"

jobs:
  fmt:
    name: zig fmt --check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: ./.github/actions/setup-zig
        with:
          zig-version: ${{ env.ZIG_VERSION }}

      - name: Format check
        run: |
          set -euo pipefail
          zig fmt --check src build.zig build.zig.zon

  build-test:
    name: zig build && zig build test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: ./.github/actions/setup-zig
        with:
          zig-version: ${{ env.ZIG_VERSION }}

      - name: Build
        run: |
          set -euo pipefail
          zig build
          test -x zig-out/bin/zig_libsql

      - name: Test
        run: |
          set -euo pipefail
          zig build test

      - name: No system sqlite3 in link line (sanity)
        run: |
          set -euo pipefail
          # Default product path must not depend on host libsqlite3.
          if ldd zig-out/bin/zig_libsql 2>/dev/null | grep -E 'libsqlite3\.so'; then
            echo "error: zig_libsql linked system libsqlite3" >&2
            exit 1
          fi
          echo "ok: no system libsqlite3 in dynamic deps"
